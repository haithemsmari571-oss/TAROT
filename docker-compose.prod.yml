services:
  backend:
    build:
      context: ./TAROT-BACKEND
      dockerfile: Dockerfile
    container_name: tarot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./TAROT-BACKEND/.env
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped

  frontend:
    build:
      context: ./tarot-landing-web
      dockerfile: Dockerfile.prod
    container_name: tarot-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
