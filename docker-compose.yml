services:
  postgres:
    image: postgres:16-alpine
    container_name: tarot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tarot
      POSTGRES_PASSWORD: tarot
      POSTGRES_DB: tarot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./TAROT-BACKEND
      dockerfile: Dockerfile
    container_name: tarot-backend
    ports:
      - "8000:8000"
    volumes:
      - ./TAROT-BACKEND:/app
    env_file:
      - ./TAROT-BACKEND/.env
    environment:
      - DATABASE_URL=postgresql://tarot:tarot@postgres:5432/tarot
      - MAIL_SERVER=mailpit
      - MAIL_PORT=1025
      - RELOAD=true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: ./tarot-landing-web
      dockerfile: Dockerfile
    container_name: tarot-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./tarot-landing-web:/app
      - /app/node_modules
    env_file:
      - ./tarot-landing-web/.env

  mailpit:
    image: axllent/mailpit:latest
    container_name: tarot-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: tarot-stripe-cli
    command:
      - listen
      - --forward-to=http://backend:8000/payment/webhook
      - --log-level=debug
    environment:
      - STRIPE_API_KEY=sk_test_51RgQoeCid9Y1wSHuYA9QLh9bcR2BJG3FIXabkRk4OZwK23f4f3Kkvs0o5FNfys2BqG7SyyUVTNlSzTg8ZkHFZrcj00JD8473Dy
    depends_on:
      - backend


volumes:
  postgres_data:
